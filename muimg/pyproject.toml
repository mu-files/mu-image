[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "muimg"
version = "0.1.20251015.1957"
description = "DNG and raw image processing utilities"
authors = [{name = "mu-files", email = "mu-files@users.noreply.github.com"}]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "opencv-python-headless",
    "numpy",
    "scipy>=1.9.0",
    "pyobjc-framework-Quartz",
    "pyobjc-framework-Cocoa",
    "tifffile",
    "imagecodecs[all]",
    "click",
    "setproctitle",
    "google-auth>=2.0.0",
    "google-auth-oauthlib>=1.0.0",
    "requests>=2.25.0",
]

[project.optional-dependencies]
test = [
    "pytest",
]

[project.scripts]
muimg = "muimg.cli:main"

[project.urls]
Homepage = "https://github.com/mu-files/mu-image"
Repository = "https://github.com/mu-files/mu-image"

[tool.setuptools]
packages = ["muimg"]
