[build-system]
requires = ["setuptools>=61.0", "wheel", "numpy"]
build-backend = "setuptools.build_meta"

[project]
name = "muimg"
version = "0.1.20260313.1541"
description = "DNG and raw image processing utilities"
authors = [{name = "mu-files", email = "mu-files@users.noreply.github.com"}]
readme = "README.md"
requires-python = ">=3.11"
license = {text = "PolyForm-Noncommercial-1.0.0"}
dependencies = [
    "av",
    "click",
    "google-auth>=2.0.0",
    "google-auth-oauthlib>=1.0.0",
    "imagecodecs[all]",
    "numpy",
    "opencv-python-headless",
    "requests>=2.25.0",
    "scipy>=1.9.0",
    "setproctitle",
    "tifffile",
]

[project.optional-dependencies]
coreimage = [
    "pyobjc-framework-Cocoa",
    "pyobjc-framework-Quartz",
]
test = [
    "pytest",
]

[project.scripts]
muimg = "muimg.cli:main"

[project.urls]
Homepage = "https://github.com/mu-files/mu-image"
Repository = "https://github.com/mu-files/mu-image"

[tool.setuptools]
packages = ["muimg"]

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "WARNING"
log_cli_format = "%(levelname)-8s %(name)s:%(filename)s:%(lineno)d %(message)s"
addopts = "--tb=no"
