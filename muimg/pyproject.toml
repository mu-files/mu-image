[build-system]
requires = ["setuptools>=64.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "muimg"
version = "0.1.0"
description = "DNG and raw image processing utilities"
authors = [{name = "mu-files", email = "mu-files@users.noreply.github.com"}]
urls = { Homepage = "https://github.com/mu-files/mu-image" }
requires-python = ">=3.11"
dependencies = [
    "opencv-python-headless>=4.9.0",
    "numpy>=2.0.0",
    "astropy>=5.0.0",
    "pyobjc>=8.0",
    "tifffile>=2025.6.1",
    "imagecodecs[all]>=2024.1.1",
    "click>=8.0.0",
    "setproctitle>=1.3.0",
]

[project.scripts]
muimg = "muimg.cli:main"

[tool.setuptools]
packages = ["muimg"]
