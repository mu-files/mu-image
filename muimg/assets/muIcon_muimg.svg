<defs>  
  <!-- Clip path for red ray: follows top of 'u' to the right then extends up and left -->
  <clipPath id="redClip">
    <path fill-rule="evenodd" d="M -500 -500 L 500 -500 L 500 500 L -500 500 Z 
    M -92.91 -112.5 L -77.27 -112.58 L -30.02 -112.68 A 1.08 1.08 0.0 0 1 -28.94 -111.6 L -28.94 -290.5 L -500 -290.5 L -500 -76.88 
    L -83.18 -76.88 Q -88.01 -85.33 -94.37 -90.59 A 3.56 3.55 21.0 0 0 -95.67 -93.5 Q -95.39 -100.32 -95.28 -109.99 Q -95.25 -112.48 -92.91 -112.5 Z"/>
  </clipPath>
  
  <!-- Clip path for orange/yellow rays: top of 'm' and above -->
  <clipPath id="mTopClip" clipPathUnits="userSpaceOnUse">
    <path fill-rule="evenodd" transform="translate(-446.5, -290.5)" d="M -500 -500 L 1500 -500 L 1500 1500 L -500 1500 Z
    M 110.29 177.16 Q 127.68 173.08 145.20 175.02 Q 177.77 177.59 200.94 199.93 A 0.86 0.86 0.0 0 0 202.13 199.94 Q 220.01 183.18 244.28 177.71 C 260.85 173.19 278.22 174.15 294.83 178.17 Q 317.15 183.70 334.17 202.37
    L 334.17 -500 L 110.29 -500 Z"/>
  </clipPath>
  
  <!-- Clip path for green/blue/indigo/violet rays: right edge of middle vertical stroke extending down and left -->
  <clipPath id="mRightLegClip" clipPathUnits="userSpaceOnUse">
    <path fill-rule="evenodd" transform="translate(-446.5, -290.5)" d="M -500 -500 L 1500 -500 L 1500 1500 L -500 1500 Z
    M 232.95 419.91 L 232.83 317.78 L 232.62 272.98 Q 232.80 266.30 235.63 259.77 Q 239.76 250.24 246.65 245.15
    L -500 245.15 L -500 1500 L 232.95 1500 Z"/>
  </clipPath>
  
  <!-- Clip path for incoming ray: top-right corner of 'u' extending up and right -->
  <clipPath id="uTopRightClip" clipPathUnits="userSpaceOnUse">
    <path fill-rule="evenodd" transform="translate(-446.5, -290.5)" d="M -500 -500 L 1500 -500 L 1500 1500 L -500 1500 Z
    M 504.81 177.95 L 568.74 178.77 L 568.91 284.96 Q 568.88 298.07 568.88 311.19 Q 568.89 324.12 567.82 332.28 L 1500 332.28 L 1500 -500 L 504.81 -500 Z"/>
  </clipPath>
</defs>

<!-- Prism on tripod - triangular prism positioned on top of tripod -->
<g transform="translate(446.5, 290.5)">
  <!-- Incoming white ray from upper right (tapered) -->
  <polygon fill="rgba(151, 176, 186)" points="200,-193 200,-188 23,-10.5 23,-13.5" clip-path="url(#uTopRightClip)"/>
  
  <!-- Internal ray across prism -->
  <line x1="23" y1="-12" x2="7.5" y2="-10" stroke="rgb(151, 176, 186)" stroke-width="3"/>
  
  <!-- Rainbow rays emanating from midpoint of left side - with clipping -->
  <!-- Red ray to top-left corner of 'u' -->
  <line x1="7.5" y1="-10" x2="-200" y2="-217" stroke="rgb(255, 0, 0)" stroke-width="2.5" clip-path="url(#redClip)"/>
  
  <line x1="7.5" y1="-10" x2="-177" y2="-117" stroke="rgb(255, 127, 0)" stroke-width="2.5" clip-path="url(#mTopClip)"/>
  <line x1="7.5" y1="-10" x2="-245" y2="-91.5" stroke="rgb(255, 255, 0)" stroke-width="2.5" clip-path="url(#mTopClip)"/>
  <line x1="7.5" y1="-10" x2="-350" y2="-10" stroke="rgb(0, 255, 0)" stroke-width="2.5" clip-path="url(#mRightLegClip)"/>
  <line x1="7.5" y1="-10" x2="-350" y2="60" stroke="rgb(0, 0, 255)" stroke-width="2.5" clip-path="url(#mRightLegClip)"/>
  <line x1="7.5" y1="-10" x2="-350" y2="130" stroke="rgb(75, 0, 130)" stroke-width="2.5" clip-path="url(#mRightLegClip)"/>
  <line x1="7.5" y1="-10" x2="-350" y2="213.25" stroke="rgb(148, 0, 211)" stroke-width="2.5" clip-path="url(#mRightLegClip)"/>
  
  <!-- Prism triangle -->
  <polygon fill="none" stroke="rgb(8, 2, 100)" 
    stroke-width="4" points="0,0 30,0 15,-24"/>
</g>

</svg>
