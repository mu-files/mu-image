name: Build Desktop Apps

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            extra-args: "--arch arm64"
          - os: windows-latest
            platform: windows
            extra-args: ""
          - os: ubuntu-latest
            platform: linux
            extra-args: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mu-dng-converter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow
          pip install -e .

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: pip install pyobjc-framework-WebKit pyobjc-framework-Cocoa

      - name: Import Code Signing Certificate
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          # Decode certificate
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          
          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # Clean up certificate file
          rm $RUNNER_TEMP/certificate.p12

      - name: Build app (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web:web" \
            --add-data "assets:assets" \
            --icon "assets/icon.png" \
            --osx-bundle-identifier "com.mufiles.mu-dng-converter" \
            --additional-hooks-dir=. \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Build app (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web;web" \
            --add-data "assets;assets" \
            --icon "assets/icon.png" \
            --additional-hooks-dir=. \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Build app (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web:web" \
            --add-data "assets:assets" \
            --additional-hooks-dir=. \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Sign macOS app
        if: matrix.platform == 'macos'
        run: |
          # Find the Developer ID Application certificate
          CERT_NAME=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with: $CERT_NAME"
          
          # Sign all executables and libraries in the app bundle
          find dist/mu-dng-converter.app -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -exec codesign --force --options runtime --sign "$CERT_NAME" --timestamp {} \;
          
          # Sign the main app bundle
          codesign --force --options runtime --sign "$CERT_NAME" --timestamp --deep dist/mu-dng-converter.app
          
          # Verify signature
          codesign --verify --verbose dist/mu-dng-converter.app

      - name: Notarize macOS app
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          # Create zip for notarization
          cd dist
          ditto -c -k --sequesterRsrc --keepParent mu-dng-converter.app mu-dng-converter-notarize.zip
          
          # Submit for notarization and wait
          xcrun notarytool submit mu-dng-converter-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --wait
          
          # Staple the notarization ticket
          xcrun stapler staple mu-dng-converter.app
          
          # Clean up notarization zip
          rm mu-dng-converter-notarize.zip

      - name: Package macOS build
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent mu-dng-converter.app $GITHUB_WORKSPACE/mu-dng-converter/mu-dng-converter-macos.zip

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^app-v', ''
          $sourceDir = "${{ github.workspace }}\mu-dng-converter\dist\mu-dng-converter"
          $issScript = "${{ github.workspace }}\mu-dng-converter\installer\windows.iss"
          $outputDir = "${{ github.workspace }}\mu-dng-converter"
          iscc.exe `
            /DAppVersion="$version" `
            /DSourceDir="$sourceDir" `
            /O"$outputDir" `
            "$issScript"

      - name: Package Linux build
        if: matrix.platform == 'linux'
        run: tar -czf mu-dng-converter-linux.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mu-dng-converter-${{ matrix.platform }}
          path: |
            mu-dng-converter/mu-dng-converter-*.zip
            mu-dng-converter/mu-dng-converter-*-setup.exe
            mu-dng-converter/mu-dng-converter-*.tar.gz
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            mu-dng-converter-macos.zip
            mu-dng-converter-windows-setup.exe
            mu-dng-converter-linux.tar.gz
          generate_release_notes: true
