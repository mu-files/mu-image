name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: macos
            extra-args: "--arch arm64"
          - os: windows-latest
            platform: windows
            extra-args: ""
          - os: ubuntu-latest
            platform: linux
            extra-args: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mu-dng-converter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Install Flet
        run: pip install flet==0.85.2

      - name: Verify Flutter
        run: flutter --version

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - name: Install CocoaPods (macOS)
        if: matrix.platform == 'macos'
        run: brew install cocoapods

      - name: Build app
        shell: bash
        run: >
          flet build ${{ matrix.platform }}
          --project mu-dng-converter
          --product "mu DNG Converter"
          --org com.mufiles
          ${{ matrix.extra-args }}
        env:
          FLET_FLUTTER_PATH: ${{ env.FLUTTER_ROOT }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Fix macOS icon
        if: matrix.platform == 'macos'
        run: |
          ICONSET_DIR="build/flutter/macos/Runner/Assets.xcassets/AppIcon.appiconset"
          for size in 16 32 64 128 256 512 1024; do
            sips -z $size $size assets/icon.png --out "$ICONSET_DIR/app_icon_${size}.png"
          done
          cd build/flutter && flutter build macos

      - name: Package macOS build
        if: matrix.platform == 'macos'
        run: |
          cd build/flutter/build/macos/Build/Products/Release
          zip -r $GITHUB_WORKSPACE/mu-dng-converter/mu-dng-converter-macos.zip mu-dng-converter.app

      - name: Package Windows build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/windows/* -DestinationPath mu-dng-converter-windows.zip

      - name: Package Linux build
        if: matrix.platform == 'linux'
        run: tar -czf mu-dng-converter-linux.tar.gz -C build/linux .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mu-dng-converter-${{ matrix.platform }}
          path: |
            mu-dng-converter/mu-dng-converter-*.zip
            mu-dng-converter/mu-dng-converter-*.tar.gz
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            mu-dng-converter-macos.zip
            mu-dng-converter-windows.zip
            mu-dng-converter-linux.tar.gz
          generate_release_notes: true
