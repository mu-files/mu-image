name: Build Desktop Apps

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            extra-args: "--arch arm64"
          - os: windows-latest
            platform: windows
            extra-args: ""
          - os: ubuntu-latest
            platform: linux
            extra-args: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mu-dng-converter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow
          pip install -e .

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: pip install pyobjc-framework-WebKit pyobjc-framework-Cocoa

      - name: Build app (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web:web" \
            --add-data "assets:assets" \
            --icon "assets/icon.png" \
            --osx-bundle-identifier "com.mufiles.mu-dng-converter" \
            --additional-hooks-dir=. \
            --hidden-import=astropy \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Build app (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web;web" \
            --add-data "assets;assets" \
            --icon "assets/icon.png" \
            --additional-hooks-dir=. \
            --hidden-import=astropy \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Build app (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web:web" \
            --add-data "assets:assets" \
            --additional-hooks-dir=. \
            --hidden-import=astropy \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Package macOS build
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent mu-dng-converter.app $GITHUB_WORKSPACE/mu-dng-converter/mu-dng-converter-macos.zip

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^app-v', ''
          $sourceDir = "${{ github.workspace }}\mu-dng-converter\dist"
          $issScript = "${{ github.workspace }}\mu-dng-converter\installer\windows.iss"
          $outputDir = "${{ github.workspace }}\mu-dng-converter"
          iscc.exe `
            /DAppVersion="$version" `
            /DSourceDir="$sourceDir" `
            /O"$outputDir" `
            "$issScript"

      - name: Package Linux build
        if: matrix.platform == 'linux'
        run: tar -czf mu-dng-converter-linux.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mu-dng-converter-${{ matrix.platform }}
          path: |
            mu-dng-converter/mu-dng-converter-*.zip
            mu-dng-converter/mu-dng-converter-*-setup.exe
            mu-dng-converter/mu-dng-converter-*.tar.gz
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            mu-dng-converter-macos.zip
            mu-dng-converter-windows-setup.exe
            mu-dng-converter-linux.tar.gz
          generate_release_notes: true
