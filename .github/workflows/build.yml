name: Build Desktop Apps

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            extra-args: "--arch arm64"
          - os: windows-latest
            platform: windows
            extra-args: ""
          - os: ubuntu-latest
            platform: linux
            extra-args: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mu-dng-converter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow
          pip install -e .

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: pip install pyobjc-framework-WebKit pyobjc-framework-Cocoa

      - name: Import Code Signing Certificate
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          # Decode certificate
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          
          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # Clean up certificate file
          rm $RUNNER_TEMP/certificate.p12

      - name: Build app (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          # Extract version from tag (e.g., app-v0.1.20260711.1657 -> 0.1.20260711.1657)
          VERSION="${GITHUB_REF_NAME#app-v}"
          echo "Building version: $VERSION"
          
          # Inject version into main.py
          sed -i '' "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" main.py
          
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web:web" \
            --add-data "assets:assets" \
            --icon "assets/icon.png" \
            --osx-bundle-identifier "com.mufiles.mu-dng-converter" \
            --additional-hooks-dir=. \
            main.py
          
          # Update Info.plist with version and metadata
          PLIST="dist/mu-dng-converter.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $VERSION" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string mu DNG Converter" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleName mu DNG Converter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSHumanReadableCopyright string © 2026 mu-files LLC" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :NSHumanReadableCopyright © 2026 mu-files LLC" "$PLIST"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Build app (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Extract version from tag
          VERSION="${GITHUB_REF_NAME#app-v}"
          echo "Building version: $VERSION"
          
          # Inject version into main.py (Windows sed syntax)
          sed -i "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" main.py
          
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web;web" \
            --add-data "assets;assets" \
            --icon "assets/icon.png" \
            --additional-hooks-dir=. \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Sign Windows executables (Azure Trusted Signing)
        if: matrix.platform == 'windows'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://wus2.codesigning.azure.net
          signing-account-name: 'mufiles-signing-prod'
          certificate-profile-name: 'mufiles-llc-profile'
          files-folder: '${{ github.workspace }}/mu-dng-converter/dist/mu-dng-converter'
          files-folder-filter: 'exe,dll'
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build app (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          # Extract version from tag
          VERSION="${GITHUB_REF_NAME#app-v}"
          echo "Building version: $VERSION"
          
          # Inject version into main.py
          sed -i "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" main.py
          
          pyinstaller --name "mu-dng-converter" \
            --windowed \
            --onedir \
            --add-data "web:web" \
            --add-data "assets:assets" \
            --additional-hooks-dir=. \
            main.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Sign macOS app
        if: matrix.platform == 'macos'
        run: |
          # Find the Developer ID Application certificate
          CERT_NAME=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with: $CERT_NAME"
          
          # Sign inside-out: libraries and executables first (deepest items)
          # BSD find uses +mode syntax for "any bit set"
          find dist/mu-dng-converter.app -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -exec codesign --force --options runtime --sign "$CERT_NAME" --timestamp {} \;
          
          # Sign the main app bundle last (no --deep to preserve internal signatures)
          codesign --force --options runtime --sign "$CERT_NAME" --timestamp dist/mu-dng-converter.app
          
          # Verify signature
          codesign --verify --verbose dist/mu-dng-converter.app

      - name: Notarize macOS app
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          # Create zip for notarization
          cd dist
          ditto -c -k --sequesterRsrc --keepParent mu-dng-converter.app mu-dng-converter-notarize.zip
          
          # Submit for notarization (async - don't wait)
          echo "Submitting to Apple Notary Service..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit mu-dng-converter-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --output-format json)
          
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"
          
          # Poll for completion with 15 minute timeout
          TIMEOUT=900
          POLL_INTERVAL=30
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
            
            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_NOTARY_PASSWORD" \
              --output-format json)
            
            STATUS=$(echo "$STATUS_OUTPUT" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Status after ${ELAPSED}s: $STATUS"
            
            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization successful!"
              xcrun stapler staple ./mu-dng-converter.app
              rm mu-dng-converter-notarize.zip
              exit 0
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed with status: $STATUS"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_NOTARY_PASSWORD"
              exit 1
            fi
          done
          
          # Timeout - fail the build
          echo "ERROR: Notarization timed out after ${TIMEOUT}s."
          echo "Submission ID for manual follow-up: $SUBMISSION_ID"
          exit 1

      - name: Package macOS build
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent mu-dng-converter.app $GITHUB_WORKSPACE/mu-dng-converter/mu-dng-converter-macos.zip

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^app-v', ''
          $sourceDir = "${{ github.workspace }}\mu-dng-converter\dist\mu-dng-converter"
          $issScript = "${{ github.workspace }}\mu-dng-converter\installer\windows.iss"
          $outputDir = "${{ github.workspace }}\mu-dng-converter"
          iscc.exe `
            /DAppVersion="$version" `
            /DSourceDir="$sourceDir" `
            /O"$outputDir" `
            "$issScript"

      - name: Sign Windows installer (Azure Trusted Signing)
        if: matrix.platform == 'windows'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://wus2.codesigning.azure.net
          signing-account-name: 'mufiles-signing-prod'
          certificate-profile-name: 'mufiles-llc-profile'
          files-folder: '${{ github.workspace }}/mu-dng-converter'
          files-folder-filter: 'exe'
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package Linux build
        if: matrix.platform == 'linux'
        run: tar -czf mu-dng-converter-linux.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mu-dng-converter-${{ matrix.platform }}
          path: |
            mu-dng-converter/mu-dng-converter-*.zip
            mu-dng-converter/mu-dng-converter-*-setup.exe
            mu-dng-converter/mu-dng-converter-*.tar.gz
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            mu-dng-converter-macos.zip
            mu-dng-converter-windows-setup.exe
            mu-dng-converter-linux.tar.gz
          generate_release_notes: true
